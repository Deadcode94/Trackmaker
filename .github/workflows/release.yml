name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers only when you create a tag (e.g. v1.1.0)

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git cmake libasound2-dev libx11-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev libxinerama-dev libwayland-dev libxkbcommon-dev

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build Project
      run: cmake --build build --config Release

    - name: Create Release Package
      run: cmake --build build --config Release --target release

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TrackmakerEditor-${{ runner.os }}
        path: build/TrackmakerEditor-*.zip
        if-no-files-found: warn

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: build/TrackmakerEditor-*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}